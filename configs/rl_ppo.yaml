seed: 1337

paths:
  sft_model: outputs/sft/best
  reference_model: outputs/sft/best
  prompts_file: data/processed/cas13_valid.jsonl
  output_dir: outputs/rl
  oracle_cache: outputs/rl/oracle_cache.sqlite

generation:
  num_samples: 16
  prompt_length: 64
  max_new_tokens: 128
  temperature: 0.9
  top_p: 0.95
  batch_size: 2

oracle:
  mode: mock
  progen3_model: Profluent-Bio/progen3-219m
  progen3:
    model_name: Profluent-Bio/progen3-219m
    device: auto
    max_length: 1024
    dtype: auto
  esmfold_backend: mock
  esmfold:
    enabled: false
    device: auto
    max_length: 800
    score_every_n_steps: 10
    top_k: 2
    pdb_dir: outputs/rl/pdb
  esmfold_frequency: 10
  esmfold_top_k: 2
  min_len: 200
  max_len: 1500

reward:
  w_pg3: 0.3
  w_plddt: 0.4
  w_valid: 0.2
  w_motif: 0.1
  w_kl: 0.0

ppo:
  use_trl: false
  steps: 2
  batch_size: 2
  mini_batch_size: 1
  learning_rate: 0.00001
  gamma: 1.0
  clip_range: 0.2
  vf_coef: 0.1
  entropy_coef: 0.01
  log_every: 1
  save_every: 10
