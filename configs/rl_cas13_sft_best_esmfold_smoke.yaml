# RL smoke test with real ESMFold
general:
  output_dir: "outputs/rl/cas13_sft_best_esmfold_smoke"
  seed: 42
  max_steps: 50

policy:
  model_path: "outputs/sft/cas13_11000_2epoch/best"
  reference_model_path: "outputs/sft/cas13_11000_2epoch/best"

oracles:
  # ProGen3 explicitly disabled
  progen3:
    enabled: false
    mode: "disabled"
  
  # Real ESMFold configuration
  esmfold:
    enabled: true
    mode: "real"
    model: "facebook/esmfold_v1"
    python: ".venv_oracle/bin/python"
    script: "scripts/19_esmfold_batch_oracle.py"
    cuda_visible_devices: "1"
    device: "cuda:0"
    chunk_size: 64
    max_length: 1500
    cache_dir: "outputs/rl/cas13_sft_best_esmfold_smoke"

generation:
  prompt_length: 64
  min_new_tokens: 100  # Shorter for smoke test
  max_new_tokens: 300
  temperature: 0.9
  top_p: 0.95
  top_k: 50
  repetition_penalty: 1.05

ppo:
  batch_size: 2
  learning_rate: 1e-6
  clip_range: 0.2
  target_kl: 0.01