seed: 1337
runtime:
  mode: nscc
paths:
  train_data: data/processed/train.jsonl
  policy_model: outputs/sft/formal/best
  output_dir: outputs/rl/cas13_nscc
  esmfold_cache: outputs/rl/cas13_nscc/esmfold_cache.sqlite
  progen3_cache: outputs/rl/cas13_nscc/progen3_cache.sqlite
generation:
  prompt_length: 64
  max_new_tokens: 512
training:
  steps: 1000
  batch_size: 8
oracle:
  esmfold:
    mode: real
    backend: facebook_esm
    model_path: /path/to/esmfold
    device: cuda
    cache_dir: /path/to/cache/esmfold
    max_length: 1500
  progen3:
    mode: real
    model_name_or_path: Profluent-Bio/progen3-3b
    code_path: /path/to/progen3
    device: cuda
    dtype: bfloat16
    cache_dir: /path/to/cache/progen3
    batch_size: 1
    max_length: 1024
reward:
  eps: 1.0e-6
  reward_scale: 1.0
  invalid_reward: -1.0
  min_len: 200
  max_len: 1500
  length_center: 900
  length_tolerance: 700
  calibration:
    lm:
      low: -5.0
      high: -0.5
    plddt:
      low: 50.0
      high: 90.0
    ptm:
      low: 0.2
      high: 0.8
    pae:
      low: 5.0
      high: 25.0
  weights:
    lm: 1.0
    plddt: 1.0
    ptm: 1.0
    pae: 0.2
    hepn: 0.5
    length: 0.5
    diversity: 0.1
  kl_weight: 0.02
