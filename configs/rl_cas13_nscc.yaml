seed: 1337
runtime:
  mode: nscc
paths:
  train_data: data/processed/train.jsonl
  policy_model: outputs/sft/formal/best
  output_dir: outputs/rl/cas13_nscc
  esmfold_cache: outputs/rl/cas13_nscc/esmfold_cache.sqlite
  progen3_cache: outputs/rl/cas13_nscc/progen3_cache.sqlite
generation:
  prompt_length: 64
  max_new_tokens: 512
training:
  steps: 1000
  batch_size: 8
oracle:
  esmfold:
    mode: real
    model_path: /path/to/esmfold
    device: cuda
    max_length: 1500
  progen3:
    mode: real
    model_path: /path/to/progen3
    device: cuda
    max_length: 1024
    dtype: bfloat16
reward:
  alpha: 0.5
  beta: 0.25
  min_len: 200
  max_len: 1500
  target_len: 900
  length_tolerance: 700
  weights:
    w_struct: 0.4
    w_lm: 0.3
    w_motif: 0.1
    w_len: 0.1
    w_div: 0.1
    w_kl: 0.02

